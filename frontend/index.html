<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator-container">
      <h1 class="title">AI Calculator</h1>
      <div class="calculator">
        <div id="display" class="display">0</div>
        <div id="error" class="error" aria-live="polite"></div>
        <div class="keypad">
          <button data-action="clear-all" class="btn utility">AC</button>
          <button data-action="clear-entry" class="btn utility">CE</button>
          <button data-op="divide" class="btn operator">÷</button>

          <button data-digit="7" class="btn">7</button>
          <button data-digit="8" class="btn">8</button>
          <button data-digit="9" class="btn">9</button>
          <button data-op="multiply" class="btn operator">×</button>

          <button data-digit="4" class="btn">4</button>
          <button data-digit="5" class="btn">5</button>
          <button data-digit="6" class="btn">6</button>
          <button data-op="subtract" class="btn operator">−</button>

          <button data-digit="1" class="btn">1</button>
          <button data-digit="2" class="btn">2</button>
          <button data-digit="3" class="btn">3</button>
          <button data-op="add" class="btn operator">+</button>

          <button data-digit="0" class="btn zero">0</button>
          <button data-decimal="." class="btn">.</button>
          <button data-action="equals" class="btn equals">=</button>
        </div>
      </div>
      <p class="hint">
        Backend expected at <code>http://localhost:3000/calculate</code>.
      </p>
    </div>

    <script src="script.js"></script>
  </body>
  </html>
